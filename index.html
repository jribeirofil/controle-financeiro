<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1D9E75">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Financeiro">
  <link rel="manifest" href="manifest.json">
  <title>Controle Familiar</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TELA DE PERFIL -->
  <div class="tela-perfil" id="tela-perfil">
    <div class="perfil-card">
      <i class="ti ti-users" aria-hidden="true"></i>
      <h2>Quem é você?</h2>
      <p>Escolha seu nome para identificar seus lançamentos</p>
      <div class="perfil-opcoes">
        <button class="perfil-btn" onclick="escolherPerfil('Jayme')">Jayme</button>
        <button class="perfil-btn" onclick="escolherPerfil('Rita')">Rita</button>
      </div>
    </div>
  </div>

  <!-- TELA DE LIMITES -->
  <div class="tela-limites" id="tela-limites">
    <div class="limites-card">
      <div class="limites-header">
        <h2>Limites por categoria</h2>
        <button class="btn-fechar-limites" onclick="fecharLimites()">
          <i class="ti ti-x" aria-hidden="true"></i>
        </button>
      </div>
      <p class="limites-desc">Defina o limite de gasto mensal para cada categoria. Deixe em branco para não ter limite.</p>
      <div id="limites-lista"></div>
      <button class="btn-salvar-limites" onclick="salvarTodosLimites()">
        <i class="ti ti-check" aria-hidden="true"></i>
        Salvar limites
      </button>
    </div>
  </div>

  <div class="app">

    <header class="top-bar">
      <div class="top-bar-left">
        <i class="ti ti-wallet" aria-hidden="true"></i>
        <span>Controle Familiar</span>
      </div>
      <div class="top-bar-right">
        <button class="perfil-badge" id="perfil-badge" onclick="trocarPerfil()" title="Trocar usuário"></button>
        <span id="mes-ref" class="mes-badge"></span>
        <button class="sync-btn" onclick="carregarDados(false)" aria-label="Atualizar" title="Sincronizar">
          <i class="ti ti-refresh" aria-hidden="true"></i>
        </button>
      </div>
    </header>

    <nav class="tab-bar" role="tablist">
      <button class="tab active" role="tab" aria-selected="true" onclick="irPara('lancar',this)">
        <i class="ti ti-plus" aria-hidden="true"></i><span>Lançar</span>
      </button>
      <button class="tab" role="tab" aria-selected="false" onclick="irPara('resumo',this)">
        <i class="ti ti-chart-bar" aria-hidden="true"></i><span>Resumo</span>
      </button>
      <button class="tab" role="tab" aria-selected="false" onclick="irPara('historico',this)">
        <i class="ti ti-list" aria-hidden="true"></i><span>Histórico</span>
      </button>
    </nav>

    <!-- ABA LANÇAR -->
    <section class="section active" id="sec-lancar" aria-label="Novo lançamento">
      <p class="secao-titulo-lancar" id="lancar-titulo">Novo lançamento</p>
      <div class="field">
        <label>Tipo</label>
        <div class="tipo-btns" role="group">
          <button class="tipo-btn despesa active" onclick="setTipo('despesa',this)" aria-pressed="true">
            <i class="ti ti-arrow-up-circle" aria-hidden="true"></i>Despesa
          </button>
          <button class="tipo-btn receita" onclick="setTipo('receita',this)" aria-pressed="false">
            <i class="ti ti-arrow-down-circle" aria-hidden="true"></i>Receita
          </button>
          <button class="tipo-btn poupanca" onclick="setTipo('poupanca',this)" aria-pressed="false">
            <i class="ti ti-piggy-bank" aria-hidden="true"></i>Poupança
          </button>
        </div>
      </div>
      <div class="field">
        <label for="valor">Valor</label>
        <div class="valor-wrap">
          <span class="valor-prefix" aria-hidden="true">R$</span>
          <input type="text" id="valor" placeholder="0,00" inputmode="numeric" pattern="[0-9,\.]*" autocomplete="off">
        </div>
      </div>
      <div class="field">
        <label for="categoria">Categoria</label>
        <select id="categoria" onchange="atualizarSubcat()">
          <option value="">Selecione...</option>
        </select>
      </div>
      <div class="field">
        <label for="subcategoria">Subcategoria</label>
        <select id="subcategoria">
          <option value="">Selecione...</option>
        </select>
      </div>
      <div class="field">
        <label for="descricao">Descrição <span class="opcional">(opcional)</span></label>
        <input type="text" id="descricao" placeholder="Ex: Mercado semana 1" autocomplete="off">
      </div>
      <div class="field">
        <label>Para quem</label>
        <div class="paraquem-btns" role="group">
          <button class="paraquem-btn active" data-nome="Família" onclick="setParaQuem('Família',this)" aria-pressed="true">Família</button>
          <button class="paraquem-btn" data-nome="Jayme" onclick="setParaQuem('Jayme',this)" aria-pressed="false">Jayme</button>
          <button class="paraquem-btn" data-nome="Rita" onclick="setParaQuem('Rita',this)" aria-pressed="false">Rita</button>
          <button class="paraquem-btn" data-nome="Davi" onclick="setParaQuem('Davi',this)" aria-pressed="false">Davi</button>
          <button class="paraquem-btn" data-nome="Lucas" onclick="setParaQuem('Lucas',this)" aria-pressed="false">Lucas</button>
        </div>
      </div>
      <div class="field">
        <label for="data">Data</label>
        <input type="date" id="data">
      </div>
      <button class="btn-lancar" onclick="lancar()">
        <i class="ti ti-check" aria-hidden="true"></i>
        Confirmar lançamento
      </button>
      <button class="btn-cancelar-edicao" id="btn-cancelar-edicao" onclick="fecharEdicao()" style="display:none;">
        <i class="ti ti-x" aria-hidden="true"></i>
        Cancelar edição
      </button>
    </section>

    <!-- ABA RESUMO -->
    <section class="section" id="sec-resumo" aria-label="Resumo do mês">
      <div class="resumo-topo">
        <div class="field field-mes">
          <select id="resumo-mes-sel" onchange="renderResumo()">
            <option value="">Todos os meses</option>
          </select>
        </div>
        <button class="btn-limites" onclick="abrirLimites()" title="Configurar limites">
          <i class="ti ti-adjustments" aria-hidden="true"></i>
          Limites
        </button>
      </div>
      <div class="resumo-cards" id="cards-resumo"></div>
      <p class="secao-title">Despesas por categoria</p>
      <div id="barras-cat"></div>
      <div id="breakdown-membros"></div>
    </section>

    <!-- ABA HISTÓRICO -->
    <section class="section" id="sec-historico" aria-label="Histórico de lançamentos">
      <div class="historico-filtros">
        <div class="filtros">
          <button class="filtro-btn active" onclick="setFiltro('todos',this)">Todos</button>
          <button class="filtro-btn" onclick="setFiltro('despesa',this)">Despesas</button>
          <button class="filtro-btn" onclick="setFiltro('receita',this)">Receitas</button>
          <button class="filtro-btn" onclick="setFiltro('poupanca',this)">Poupança</button>
        </div>
        <div class="field field-mes">
          <select id="filtro-mes" onchange="setFiltroMes(this.value)">
            <option value="">Todos os meses</option>
          </select>
        </div>
      </div>
      <div class="lista-lancamentos" id="lista"></div>
    </section>

  </div>

  <!-- MODAL CONFIRMAÇÃO EXCLUSÃO -->
  <div class="modal-overlay" id="modal-exclusao">
    <div class="modal-card">
      <p class="modal-titulo">Remover lançamento</p>
      <p class="modal-desc">Essa ação não pode ser desfeita.</p>
      <div class="modal-acoes">
        <button class="modal-btn" onclick="fecharModal()">Cancelar</button>
        <button class="modal-btn confirmar" id="modal-btn-confirmar">Remover</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
